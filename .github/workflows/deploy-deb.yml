name: Build & Deploy Debian Kernel Package

# Builds a binary Debian kernel package (.deb) and uploads it to S3.
# Triggered whenever kernel.pin changes on the default branch.
on:
  push:
    branches:
      - master
    paths:
      - 'kernel.pin'

permissions:
  contents: read

concurrency:
  group: deploy-deb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      # Configure these in repo Settings -> Secrets and variables -> Actions.
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      # Base prefix. Holds the rolling "latest" .deb (version stripped from the
      # filename, overwritten every release) plus a versions/ subfolder.
      ARTIFACTS_PREFIX: ${{ vars.ARTIFACTS_PREFIX || 'artifacts' }}
      # Subfolder under ARTIFACTS_PREFIX where each permanent, versioned build
      # is kept (filename keeps the version).
      VERSIONS_SUBDIR: ${{ vars.VERSIONS_SUBDIR || 'versions' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read kernel.pin
        id: pin
        run: |
          set -euo pipefail
          if [[ ! -f kernel.pin ]]; then
            echo "kernel.pin not found" >&2
            exit 1
          fi
          # Export every KEY=VALUE line (skipping comments/blanks) to GITHUB_OUTPUT.
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" == \#* ]] && continue
            key="$(echo "$key" | tr -d '[:space:]')"
            value="$(echo "$value" | sed 's/[[:space:]]*$//')"
            [[ -z "$key" ]] && continue
            echo "$key=$value" >> "$GITHUB_OUTPUT"
            echo "pinned $key=$value"
          done < kernel.pin

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            dpkg-dev fakeroot rsync kmod cpio

      - name: Configure kernel
        run: |
          set -euo pipefail
          # Start from a sane default config, then drop debug/trusted-key knobs
          # that break unattended CI builds.
          make defconfig
          scripts/config --disable SYSTEM_TRUSTED_KEYS || true
          scripts/config --disable SYSTEM_REVOCATION_KEYS || true
          scripts/config --disable DEBUG_INFO_BTF || true
          make olddefconfig

      - name: Build Debian binary package
        run: |
          set -euo pipefail
          make -j"$(nproc)" \
            LOCALVERSION="${{ steps.pin.outputs.LOCALVERSION }}" \
            KDEB_PKGVERSION="${{ steps.pin.outputs.VERSION }}" \
            bindeb-pkg

      - name: Collect artifacts
        id: collect
        run: |
          set -euo pipefail
          mkdir -p dist
          # bindeb-pkg drops the .deb files in the parent directory.
          shopt -s nullglob
          debs=(../*.deb)
          if [[ ${#debs[@]} -eq 0 ]]; then
            echo "No .deb produced" >&2
            exit 1
          fi
          mv "${debs[@]}" dist/
          ls -la dist/
          echo "count=${#debs[@]}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: dist/*.deb
          if-no-files-found: error

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          set -euo pipefail
          if [[ -z "${S3_BUCKET:-}" ]]; then
            echo "S3_BUCKET variable is not set" >&2
            exit 1
          fi
          version="${{ steps.pin.outputs.VERSION }}"

          # 1) Permanent, versioned copies: keep the original .deb filenames
          #    (which carry the version) under artifacts/versions/.
          aws s3 cp dist/ "s3://${S3_BUCKET}/${ARTIFACTS_PREFIX}/${VERSIONS_SUBDIR}/" \
            --recursive --exclude '*' --include '*.deb'

          # 2) Rolling "latest" copies directly under artifacts/: strip the
          #    version from each filename so the key is stable and overwrites
          #    every release.
          for f in dist/*.deb; do
            base="$(basename "$f")"
            # Remove the version token (and any separator glued to it), then
            # collapse the separators left behind so e.g.
            #   linux-image-7.1.0-jade_7.1.0_amd64.deb -> linux-image-jade_amd64.deb
            stable="$(echo "$base" | sed -E "s/[-_]?${version//./\\.}//g; s/_{2,}/_/g; s/-{2,}/-/g; s/[-_]+\./\./g")"
            echo "latest: ${base} -> ${stable}"
            aws s3 cp "$f" "s3://${S3_BUCKET}/${ARTIFACTS_PREFIX}/${stable}"
          done
